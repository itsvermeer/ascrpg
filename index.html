<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aswang Chronicles · Barangay Balete</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    #ui-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #eee;
      z-index: 10;
    }
    #status-bars {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #5a2020;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 160px;
      backdrop-filter: blur(4px);
      display: none;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
      font-size: 12px;
    }
    .bar-label {
      width: 28px;
      font-weight: bold;
    }
    .bar-track {
      flex: 1;
      height: 8px;
      background: #1a0000;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #330000;
    }
    .bar-fill {
      height: 100%;
      transition: width 0.25s;
    }
    .hp-fill { background: linear-gradient(90deg, #c22, #f66); box-shadow: 0 0 6px red; }
    .mp-fill { background: linear-gradient(90deg, #36c, #69f); box-shadow: 0 0 6px blue; }
    .exp-fill { background: linear-gradient(90deg, #393, #6c6); box-shadow: 0 0 4px green; }

    .dialog-box {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      max-width: 700px;
      background: rgba(10, 0, 0, 0.9);
      border: 3px solid #8b3a3a;
      border-radius: 14px;
      padding: 18px 22px;
      display: none;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      pointer-events: auto;
      backdrop-filter: blur(4px);
    }
    .dialog-portrait {
      width: 70px;
      height: 70px;
      border: 3px solid #a55;
      border-radius: 12px;
      float: left;
      margin-right: 18px;
      image-rendering: pixelated;
      background: #221;
    }
    .dialog-text {
      font-size: clamp(13px, 2vw, 16px);
      line-height: 1.5;
      color: #f0d8a0;
    }
    .dialog-hint {
      text-align: right;
      font-size: 12px;
      color: #887766;
      margin-top: 8px;
    }
    #minimap-corner {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #5a2020;
      overflow: hidden;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px black;
      pointer-events: none;
      display: none;
    }
    #mobile-controls {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
    }
    .ctrl-btn {
      position: absolute;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: rgba(80,0,0,0.4);
      border: 2px solid rgba(200,50,50,0.5);
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffaaaa;
      font-size: 22px;
      text-shadow: 0 0 5px red;
      touch-action: manipulation;
    }
    .ctrl-btn:active { background: rgba(180,20,20,0.7); }
    @media (min-width: 900px) { #mobile-controls { display: none; } }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui-layer">
    <div id="status-bars">
      <div class="bar-row"><span class="bar-label">HP</span><div class="bar-track"><div class="bar-fill hp-fill" id="hpFill" style="width:100%"></div></div><span id="hpText">100/100</span></div>
      <div class="bar-row"><span class="bar-label">MP</span><div class="bar-track"><div class="bar-fill mp-fill" id="mpFill" style="width:100%"></div></div><span id="mpText">50/50</span></div>
      <div class="bar-row"><span class="bar-label">Lv</span><span id="lvlText">1</span><span style="margin-left:auto;" id="expText">0/30</span></div>
      <div class="bar-track"><div class="bar-fill exp-fill" id="expFill" style="width:0%"></div></div>
    </div>
    <div class="dialog-box" id="dialogBox">
      <canvas class="dialog-portrait" id="dialogPortrait" width="70" height="70"></canvas>
      <div class="dialog-text" id="dialogText"></div>
      <div class="dialog-hint">[Space / Tap] continue</div>
    </div>
    <div id="minimap-corner"><canvas id="minimapCanvas" width="90" height="90"></canvas></div>
  </div>
  <div id="mobile-controls">
    <div class="ctrl-btn" id="btnUp" style="bottom:140px;left:70px;">▲</div>
    <div class="ctrl-btn" id="btnDown" style="bottom:40px;left:70px;">▼</div>
    <div class="ctrl-btn" id="btnLeft" style="bottom:90px;left:10px;">◀</div>
    <div class="ctrl-btn" id="btnRight" style="bottom:90px;left:130px;">▶</div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    //  ASWANG CHRONICLES - FULL RPG WITH SPRITE ANIMATION ENGINE
    // ═══════════════════════════════════════════════════════════

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const minimapCanvas = document.getElementById('minimapCanvas');
    const minimapCtx = minimapCanvas.getContext('2d');

    let W, H;
    const TILE_SIZE = 32;
    const MAP_W = 80, MAP_H = 80;

    function resize() {
      W = canvas.width = Math.min(window.innerWidth, window.innerHeight * 1.6);
      H = canvas.height = Math.min(window.innerHeight, window.innerWidth / 1.6);
    }
    window.addEventListener('resize', resize);
    resize();

    // ═══════════════ AUDIO ENGINE ═══════════════
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
    function playTone(freq, type, duration, vol=0.1, glide=0) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      if (glide) osc.frequency.linearRampToValueAtTime(freq+glide, t+duration);
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t+duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t); osc.stop(t+duration);
    }
    function sfxAttack() { playTone(200, 'square', 0.15, 0.15); playTone(120, 'sawtooth', 0.2, 0.1); }
    function sfxMagic() { playTone(400, 'triangle', 0.2, 0.2, 200); playTone(600, 'sine', 0.3, 0.1); }
    function sfxHeal() { playTone(500, 'sine', 0.25, 0.15); playTone(700, 'sine', 0.3, 0.15); }
    function sfxHit() { playTone(80, 'square', 0.2, 0.2); }
    function sfxWin() { playTone(800, 'square', 0.15); setTimeout(()=>playTone(1000,'square',0.2),100); }
    function sfxError() { playTone(100, 'sawtooth', 0.3, 0.15); }

    // ═══════════════ SPRITE GENERATION ═══════════════
    function createSpriteSheet(width, height, drawFn) {
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      const cx = c.getContext('2d');
      cx.imageSmoothingEnabled = false;
      drawFn(cx);
      return c;
    }

    // Player: 4 dirs x 4 frames = 16 frames, each 24x32
    const PLAYER_FW = 24, PLAYER_FH = 32;
    const playerSheet = createSpriteSheet(PLAYER_FW * 4 * 4, PLAYER_FH, ctx => {
      const dirs = ['down','left','right','up'];
      dirs.forEach((dir, dIdx) => {
        for (let f=0; f<4; f++) {
          const fx = (dIdx*4+f)*PLAYER_FW;
          drawPlayerFrame(ctx, fx, 0, dir, f);
        }
      });
    });

    function drawPlayerFrame(ctx, x, y, dir, frame) {
      ctx.save(); ctx.translate(x+PLAYER_FW/2, y+4);
      const bob = (frame%2===0)?0:(frame===1?-1:1);
      // hat
      ctx.fillStyle='#5a3a1a'; ctx.fillRect(-9,-18+bob,18,4);
      ctx.fillStyle='#7a523a'; ctx.fillRect(-10,-20+bob,20,3);
      // face
      ctx.fillStyle='#d4a574'; ctx.fillRect(-6,-14+bob,12,10);
      ctx.fillStyle='#fff'; ctx.fillRect(-4,-12+bob,3,3); ctx.fillRect(2,-12+bob,3,3);
      ctx.fillStyle='#000'; ctx.fillRect(-3,-11+bob,1,1); ctx.fillRect(3,-11+bob,1,1);
      // body
      ctx.fillStyle='#2a5a2a'; ctx.fillRect(-6,-4+bob,12,15);
      ctx.fillStyle='#4a7a4a'; ctx.fillRect(-5,-3+bob,10,13);
      // legs
      const legShift = frame%2===0?2:-2;
      ctx.fillStyle='#3a2a1a'; ctx.fillRect(-5,11+bob,5,9); ctx.fillRect(1,11+bob+legShift,5,9);
      // arms
      ctx.fillStyle='#d4a574'; ctx.fillRect(-9,0+bob,4,9); ctx.fillRect(6,0+bob+legShift*0.5,4,9);
      ctx.restore();
    }

    // NPC: elder & merchant
    function drawNpcFrame(ctx, x, y, type, frame) {
      ctx.save(); ctx.translate(x+10, y+2);
      if (type==='elder') {
        ctx.fillStyle='#ccc'; ctx.fillRect(-8,-18,16,5);
        ctx.fillStyle='#d4a574'; ctx.fillRect(-6,-13,12,10);
        ctx.fillStyle='#6a4a2a'; ctx.fillRect(-5,-3,10,12);
        ctx.fillStyle='#222'; ctx.fillRect(-2,-10,2,2); ctx.fillRect(4,-10,2,2);
      } else {
        ctx.fillStyle='#c49a6a'; ctx.fillRect(-6,-13,12,10);
        ctx.fillStyle='#a44'; ctx.fillRect(-6,-3,12,14);
        ctx.fillStyle='#aa0'; ctx.fillRect(-2,-11,2,2); ctx.fillRect(3,-11,2,2);
      }
      ctx.restore();
    }
    const elderSheet = createSpriteSheet(20*4, 28, ctx=>{for(let f=0;f<4;f++) drawNpcFrame(ctx,f*20,0,'elder',f);});
    const merchantSheet = createSpriteSheet(20*4, 28, ctx=>{for(let f=0;f<4;f++) drawNpcFrame(ctx,f*20,0,'merchant',f);});

    // Portraits
    function createPortrait(drawFn) {
      return createSpriteSheet(48,48,ctx=>{ctx.save();ctx.translate(24,24);drawFn(ctx);ctx.restore();});
    }
    const playerPortrait = createPortrait(ctx=>{
      ctx.fillStyle='#d4a574';ctx.fillRect(-10,-12,20,18);ctx.fillStyle='#2a5a2a';ctx.fillRect(-8,6,16,8);
      ctx.fillStyle='#5a3a1a';ctx.fillRect(-10,-16,20,6);ctx.fillStyle='#fff';ctx.fillRect(-5,-8,4,4);ctx.fillRect(2,-8,4,4);
    });
    const elderPortrait = createPortrait(ctx=>{
      ctx.fillStyle='#ddd';ctx.fillRect(-12,-14,24,8);ctx.fillStyle='#d4a574';ctx.fillRect(-8,-6,16,16);
      ctx.fillStyle='#444';ctx.fillRect(-3,-3,3,3);ctx.fillRect(4,-3,3,3);
    });

    // Enemy sprites (animated in battle) - larger 64x64
    function createEnemySheet(type) {
      return createSpriteSheet(64, 64, ctx => {
        ctx.save(); ctx.translate(32,32);
        if (type==='aswang') {
          ctx.fillStyle='#3a0a0a'; ctx.beginPath(); ctx.arc(0,2,24,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#5a1a1a'; ctx.beginPath(); ctx.arc(-6,-4,18,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(-10,-6,5,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(6,-6,5,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-10,-6,2,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(6,-6,2,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#fff'; ctx.fillRect(-12,12,24,5); ctx.fillStyle='#aaa'; ctx.fillRect(-10,13,20,3);
        } else if (type==='tikbalang') {
          ctx.fillStyle='#3a2a0a'; ctx.fillRect(-18,-24,36,48);
          ctx.fillStyle='#6a4a1a'; ctx.fillRect(-14,-20,28,40);
          ctx.fillStyle='#f40'; ctx.beginPath(); ctx.arc(-8,-12,5,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#f40'; ctx.beginPath(); ctx.arc(8,-12,5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      });
    }
    const aswangSheet = createEnemySheet('aswang');
    const tikbalangSheet = createEnemySheet('tikbalang');

    // ═══════════════ TILE MAP ═══════════════
    const TILE_GRASS=0, TILE_PATH=1, TILE_WALL=2, TILE_WATER=3, TILE_HOUSE=4;
    const tileColors = {
      [TILE_GRASS]:'#1a3a1a', [TILE_PATH]:'#5a4a2a', [TILE_WALL]:'#333',
      [TILE_WATER]:'#113366', [TILE_HOUSE]:'#6a4a2a',
    };
    const map = [];
    for (let y=0;y<MAP_H;y++) {
      map[y]=[];
      for (let x=0;x<MAP_W;x++) {
        if (x<2||x>=MAP_W-2||y<2||y>=MAP_H-2) map[y][x]=TILE_WALL;
        else if ((x>10&&x<16&&y>8&&y<14)||(x>30&&x<36&&y>22&&y<28)) map[y][x]=TILE_HOUSE;
        else if (x>4&&x<8&&y>20&&y<24) map[y][x]=TILE_WATER;
        else if ((x+y)%5===0||(x*y)%7===0) map[y][x]=TILE_PATH;
        else map[y][x]=TILE_GRASS;
      }
    }

    // ═══════════════ GAME STATE ═══════════════
    const player = {
      x: 5*TILE_SIZE+16, y: 5*TILE_SIZE+16,
      hp:100,maxHp:100,mp:50,maxMp:50,level:1,exp:0,expToLevel:30,
      gold:0,potions:2,
      direction:'down',moving:false,animFrame:0,animTimer:0,
      moveSpeed:2.4,
    };

    const npcs = [
      {x:12,y:11,type:'elder',name:'Lolo Basilio',dialog:['Welcome to Barangay Balete, Elias.','Beware the aswang that roam at night.','Take this healing potion. (Received)'],action:()=>{player.potions++;}},
      {x:33,y:25,type:'merchant',name:'Aling Rosa',dialog:['Need supplies? I sell potions and charms.','Come back when you have more gold.']}
    ];

    let battleActive=false, currentEnemy=null, battleMessage='';
    let dialogActive=false, currentDialog=[], dialogIdx=0;
    let cutsceneActive=false, cutsceneQueue=[];
    let screenShake=0, battleFlash=0;
    let battleParticles=[];
    let gameState='title'; // 'title','playing','cutscene'

    // ═══════════════ DIALOGUE ═══════════════
    function startDialogue(npc) {
      dialogActive=true; currentDialog=npc.dialog.slice(); dialogIdx=0;
      document.getElementById('dialogBox').style.display='block';
      updateDialogueBox(npc);
    }
    function advanceDialogue() {
      dialogIdx++;
      if (dialogIdx>=currentDialog.length) { endDialogue(); }
      else updateDialogueBox(null);
    }
    function endDialogue() {
      dialogActive=false; document.getElementById('dialogBox').style.display='none';
      const npc = npcs.find(n=>n.dialog===currentDialog);
      if (npc&&npc.action&&dialogIdx===currentDialog.length-1) npc.action();
      currentDialog=[];
    }
    function updateDialogueBox(npc) {
      document.getElementById('dialogText').textContent = currentDialog[dialogIdx]||'';
      const pc = document.getElementById('dialogPortrait'), pctx=pc.getContext('2d');
      pctx.clearRect(0,0,70,70);
      if (npc&&npc.type==='elder') pctx.drawImage(elderPortrait,0,0,48,48,11,11,48,48);
      else pctx.drawImage(playerPortrait,0,0,48,48,11,11,48,48);
    }

    function tryInteract() {
      for (const npc of npcs) {
        const dx=player.x-(npc.x*TILE_SIZE+16), dy=player.y-(npc.y*TILE_SIZE+16);
        if (Math.sqrt(dx*dx+dy*dy)<40) { startDialogue(npc); return; }
      }
      battleMessage='Nothing to interact with.';
    }

    // ═══════════════ BATTLE ═══════════════
    function startBattle(type) {
      initAudio();
      battleActive=true;
      const templates={aswang:{hp:80,maxHp:80,damage:8,exp:20,name:'Forest Aswang',sheet:aswangSheet},
                      tikbalang:{hp:120,maxHp:120,damage:14,exp:35,name:'Tikbalang',sheet:tikbalangSheet}};
      const t = templates[type]||templates.aswang;
      currentEnemy={...t,hp:t.maxHp,stunned:false};
      battleMessage=`${currentEnemy.name} appears!`;
      battleFlash=10; screenShake=6;
      updateUI();
    }

    function playerAttack() {
      if (!battleActive||!currentEnemy) return;
      sfxAttack();
      const dmg=Math.floor(Math.random()*12)+8;
      currentEnemy.hp-=dmg; battleFlash=15; screenShake=8;
      spawnParticles(W/2+100,250,'#f44',15);
      battleMessage=`Elias attacks for ${dmg} damage!`;
      if (currentEnemy.hp<=0){victory();return;}
      setTimeout(enemyTurn,900);
    }
    function playerMagic() {
      if (player.mp<8){battleMessage='Not enough MP!';sfxError();return;}
      player.mp-=8; sfxMagic();
      const dmg=Math.floor(Math.random()*25)+15;
      currentEnemy.hp-=dmg; battleFlash=25; screenShake=10;
      spawnParticles(W/2+100,250,'#a6f',20);
      battleMessage=`Shadow Flame deals ${dmg} damage!`;
      if (currentEnemy.hp<=0){victory();return;}
      setTimeout(enemyTurn,900);
    }
    function playerHeal() {
      if (player.mp<6){battleMessage='Not enough MP!';sfxError();return;}
      player.mp-=6; sfxHeal();
      const heal=Math.min(20+Math.floor(Math.random()*15),player.maxHp-player.hp);
      player.hp+=heal;
      spawnParticles(W/2-50,300,'#6f6',12);
      battleMessage=`Light Prayer restores ${heal} HP!`;
      setTimeout(enemyTurn,900);
    }
    function enemyTurn() {
      if (!battleActive||!currentEnemy) return;
      if (currentEnemy.stunned){currentEnemy.stunned=false;battleMessage='Enemy is stunned!';return;}
      const dmg=Math.floor(Math.random()*currentEnemy.damage)+4;
      player.hp-=dmg; if(player.hp<0)player.hp=0;
      sfxHit(); battleFlash=10; screenShake=6;
      battleMessage=`${currentEnemy.name} hits for ${dmg} damage!`;
      if (player.hp<=0){gameOver();return;}
      updateUI();
    }
    function victory() {
      player.exp+=currentEnemy.exp; player.gold+=15;
      sfxWin(); battleMessage=`${currentEnemy.name} defeated! +${currentEnemy.exp} EXP`;
      checkLevelUp();
      setTimeout(()=>{battleActive=false;currentEnemy=null;updateUI();},1500);
    }
    function gameOver() {
      battleMessage='Elias falls... Respawning.';
      setTimeout(()=>{
        player.hp=Math.floor(player.maxHp/2); player.mp=Math.floor(player.maxMp/2);
        battleActive=false; currentEnemy=null;
        player.x=5*TILE_SIZE+16; player.y=5*TILE_SIZE+16;
        updateUI();
      },2000);
    }
    function spawnParticles(x,y,color,count) {
      for(let i=0;i<count;i++) battleParticles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:20,color,size:2+Math.random()*4});
    }
    function checkLevelUp() {
      while(player.exp>=player.expToLevel){
        player.exp-=player.expToLevel; player.level++; player.expToLevel=Math.floor(player.expToLevel*1.5);
        player.maxHp+=12; player.hp=player.maxHp; player.maxMp+=6; player.mp=player.maxMp;
      }
    }

    // ═══════════════ CUTSCENE ═══════════════
    function playCutscene(commands) {
      cutsceneActive=true; cutsceneQueue=commands.slice(); processCutscene();
    }
    function processCutscene() {
      if (cutsceneQueue.length===0){cutsceneActive=false;if(gameState==='cutscene')gameState='playing';return;}
      const cmd=cutsceneQueue.shift();
      if (cmd.type==='message') {
        battleMessage=cmd.text; updateUI();
        setTimeout(processCutscene, cmd.duration||2000);
      } else if (cmd.type==='wait') {
        setTimeout(processCutscene, cmd.duration);
      }
    }

    // ═══════════════ UPDATE ═══════════════
    function update() {
      if (dialogActive||cutsceneActive||gameState==='title') return;
      if (!battleActive) {
        let dx=0,dy=0;
        if (keys['w']||keys['arrowup']){dy=-1;player.direction='up';}
        if (keys['s']||keys['arrowdown']){dy=1;player.direction='down';}
        if (keys['a']||keys['arrowleft']){dx=-1;player.direction='left';}
        if (keys['d']||keys['arrowright']){dx=1;player.direction='right';}
        if (dx||dy){
          player.moving=true;
          const nx=player.x+dx*player.moveSpeed, ny=player.y+dy*player.moveSpeed;
          const tx=Math.floor(nx/TILE_SIZE), ty=Math.floor(ny/TILE_SIZE);
          if (map[ty]&&map[ty][tx]!==TILE_WALL&&map[ty][tx]!==TILE_WATER&&map[ty][tx]!==TILE_HOUSE){
            player.x=nx; player.y=ny;
          }
          player.animTimer++; if(player.animTimer>8){player.animFrame=(player.animFrame+1)%4;player.animTimer=0;}
        } else { player.moving=false; player.animFrame=0; }
        if (Math.random()<0.002) startBattle('aswang');
      }
      for (let i=battleParticles.length-1;i>=0;i--){
        const p=battleParticles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
        if (p.life<=0) battleParticles.splice(i,1);
      }
      if (screenShake>0) screenShake--;
      if (battleFlash>0) battleFlash--;
      updateUI();
    }

    function updateUI() {
      document.getElementById('hpFill').style.width=`${(player.hp/player.maxHp)*100}%`;
      document.getElementById('mpFill').style.width=`${(player.mp/player.maxMp)*100}%`;
      document.getElementById('expFill').style.width=`${(player.exp/player.expToLevel)*100}%`;
      document.getElementById('hpText').textContent=`${player.hp}/${player.maxHp}`;
      document.getElementById('mpText').textContent=`${player.mp}/${player.maxMp}`;
      document.getElementById('lvlText').textContent=player.level;
      document.getElementById('expText').textContent=`${player.exp}/${player.expToLevel}`;
    }

    // ═══════════════ RENDER ═══════════════
    function drawTileMap(ctx, camX, camY) {
      const stx=Math.floor(camX/TILE_SIZE), sty=Math.floor(camY/TILE_SIZE);
      const etx=stx+Math.ceil(W/TILE_SIZE)+1, ety=sty+Math.ceil(H/TILE_SIZE)+1;
      for (let ty=sty;ty<=ety;ty++) for (let tx=stx;tx<=etx;tx++) {
        if (ty<0||ty>=MAP_H||tx<0||tx>=MAP_W) continue;
        const tile=map[ty][tx], sx=tx*TILE_SIZE-camX, sy=ty*TILE_SIZE-camY;
        ctx.fillStyle=tileColors[tile]; ctx.fillRect(sx,sy,TILE_SIZE,TILE_SIZE);
        if (tile===TILE_GRASS){ctx.fillStyle='#2a5a2a';ctx.fillRect(sx+2,sy+2,3,3);}
        else if (tile===TILE_PATH){ctx.fillStyle='#7a6a4a';ctx.fillRect(sx+6,sy+6,4,4);}
      }
    }

    function drawSprite(ctx, sheet, frameIdx, frameW, frameH, dx, dy, flip=false) {
      const col = frameIdx % (sheet.width/frameW);
      const row = Math.floor(frameIdx / (sheet.width/frameW));
      ctx.save();
      if (flip) { ctx.translate(dx, dy); ctx.scale(-1,1); ctx.drawImage(sheet, col*frameW, row*frameH, frameW, frameH, -frameW/2, -frameH, frameW, frameH); }
      else ctx.drawImage(sheet, col*frameW, row*frameH, frameW, frameH, dx-frameW/2, dy-frameH, frameW, frameH);
      ctx.restore();
    }

    function drawGame() {
      ctx.clearRect(0,0,W,H);
      if (gameState==='title') {
        ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#a00'; ctx.font='42px Georgia'; ctx.textAlign='center';
        ctx.fillText('ASWANG',W/2,H/2-40); ctx.fillText('CHRONICLES',W/2,H/2+10);
        ctx.fillStyle='#ffcc00'; ctx.font='16px Georgia';
        ctx.fillText('Barangay Balete',W/2,H/2+50);
        ctx.fillStyle='#fff'; ctx.font='14px Georgia';
        ctx.fillText('Press Space or Tap to Start',W/2,H/2+90);
        return;
      }

      const camX = player.x - W/2, camY = player.y - H/2;
      drawTileMap(ctx, camX, camY);

      // NPCs
      for (const npc of npcs) {
        const nx = npc.x*TILE_SIZE+16 - camX, ny = npc.y*TILE_SIZE+16 - camY;
        const sheet = npc.type==='elder'?elderSheet:merchantSheet;
        drawSprite(ctx, sheet, 0, 20, 28, nx, ny);
      }

      // Player
      const dirIdx = {down:0,left:1,right:2,up:3}[player.direction]||0;
      const frame = player.moving ? player.animFrame : 0;
      drawSprite(ctx, playerSheet, dirIdx*4+frame, PLAYER_FW, PLAYER_FH, W/2, H/2);

      // Battle overlay
      if (battleActive && currentEnemy) {
        ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#fff'; ctx.font='24px Georgia'; ctx.textAlign='center';
        ctx.fillText(currentEnemy.name, W/2, 70);
        // enemy sprite centered
        drawSprite(ctx, currentEnemy.sheet, 0, 64, 64, W/2+120, 250);
        // HP bars
        ctx.fillStyle='#300'; ctx.fillRect(W/2-150,90,300,16);
        ctx.fillStyle='#c00'; ctx.fillRect(W/2-150,90,300*(currentEnemy.hp/currentEnemy.maxHp),16);
        ctx.fillStyle='#300'; ctx.fillRect(50, H-100, 200,14);
        ctx.fillStyle='#0c0'; ctx.fillRect(50, H-100, 200*(player.hp/player.maxHp),14);
        ctx.fillStyle='#fff'; ctx.font='14px monospace';
        ctx.fillText(`HP ${player.hp}/${player.maxHp}`, 50, H-110);
        ctx.fillText(battleMessage, W/2, H-40);
        // particles
        for (const p of battleParticles) { ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size); }
      }

      // vignette
      const grad = ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,450);
      grad.addColorStop(0,'rgba(0,0,0,0)'); grad.addColorStop(0.5,'rgba(0,0,0,0.15)'); grad.addColorStop(1,'rgba(0,0,0,0.85)');
      ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

      if (screenShake>0) {
        const sx=(Math.random()-0.5)*screenShake*1.5, sy=(Math.random()-0.5)*screenShake*1.5;
        canvas.style.transform=`translate(${sx}px,${sy}px)`;
      } else canvas.style.transform='';

      // minimap
      if (gameState==='playing' && !battleActive) {
        minimapCtx.clearRect(0,0,90,90); minimapCtx.fillStyle='#111';
        minimapCtx.beginPath(); minimapCtx.arc(45,45,45,0,Math.PI*2); minimapCtx.fill();
        const s=0.8;
        for (let y=0;y<MAP_H;y++) for (let x=0;x<MAP_W;x++) if(map[y][x]===TILE_WALL||map[y][x]===TILE_WATER){
          minimapCtx.fillStyle=map[y][x]===TILE_WALL?'#666':'#26a';
          minimapCtx.fillRect(45+(x-MAP_W/2)*s,45+(y-MAP_H/2)*s,1,1);
        }
        minimapCtx.fillStyle='#f44'; minimapCtx.fillRect(45+(player.x/TILE_SIZE-MAP_W/2)*s,45+(player.y/TILE_SIZE-MAP_H/2)*s,2,2);
      }
    }

    // ═══════════════ INPUT ═══════════════
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (gameState==='title') { startGame(); return; }
        if (dialogActive) { advanceDialogue(); return; }
        if (!battleActive && !cutsceneActive) tryInteract();
      }
      if (battleActive) {
        if (e.key==='1') playerAttack();
        if (e.key==='2') playerMagic();
        if (e.key==='3') playerHeal();
      }
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
    canvas.addEventListener('click', () => {
      if (gameState==='title') startGame();
      else if (dialogActive) advanceDialogue();
    });

    function bindMobile(id, key) {
      const btn=document.getElementById(id);
      if(!btn)return;
      btn.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;});
      btn.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;});
    }
    bindMobile('btnUp','w'); bindMobile('btnDown','s'); bindMobile('btnLeft','a'); bindMobile('btnRight','d');

    function startGame() {
      gameState='cutscene';
      document.getElementById('status-bars').style.display='block';
      document.getElementById('minimap-corner').style.display='block';
      playCutscene([
        {type:'message', text:'Elias returns to Barangay Balete...', duration:2500},
        {type:'message', text:'The elders spoke of a growing darkness.', duration:2500},
        {type:'message', text:'Find Lolo Basilio near the old house.', duration:2500},
        {type:'wait', duration:500}
      ]);
      initAudio();
      // play a little opening jingle
      playTone(400,'triangle',0.3); setTimeout(()=>playTone(600,'triangle',0.2),150);
    }

    function gameLoop() {
      update();
      drawGame();
      requestAnimationFrame(gameLoop);
    }

    updateUI();
    document.getElementById('status-bars').style.display='none';
    document.getElementById('minimap-corner').style.display='none';
    gameLoop();
  </script>
</body>
</html>
